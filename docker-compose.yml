services:
  sistema_cache:
    image: redis:alpine
    container_name: sistema_cache
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru

  api_cache:
    build: ./api_cache
    container_name: api_cache
    ports:
      - "8000:8000"
    depends_on:
      - sistema_cache
      - api_respuestas

  api_metricas:
    build: ./metricas
    container_name: api_metricas
    ports:
      - "8001:8000"

  api_respuestas:
    build: ./generador_respuestas
    container_name: api_respuestas
    depends_on:
      - api_metricas

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      bash -c "
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic queries --partitions 3 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic retry_queries --partitions 3 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic dlq --partitions 1 --replication-factor 1 &&
      echo 'Topics creados correctamente'
      "
    restart: "no"

  kafka_consumer:
    build: ./kafka_consumer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      api_respuestas:
        condition: service_started
      sistema_cache:
        condition: service_started
      api_metricas:
        condition: service_started
    environment:
      - KAFKA_BROKER=kafka:9092
      - MAX_RETRIES=3

  app_trafico:
    build: ./generador_trafico
    container_name: app_trafico
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      api_cache:
        condition: service_started
    environment:
      - DISTRIBUCION=ZIPF   # ZIPF | UNIFORME
      - MODO=KAFKA          # KAFKA | SYNC
      - DELAY=0.1            # segundos entre consultas (bajar para spike: 0.01)
